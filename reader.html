<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Echoes Reader</title><style>

body{
margin:0;
background:black;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* BACK BUTTON */

#back{
position:fixed;
top:15px;
left:15px;
padding:8px 14px;
border:none;
border-radius:6px;
background:white;
z-index:10;
}

/* READER AREA */

#reader{
flex:1;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* CANVAS */

canvas{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* PROGRESS CONTAINER */

#progress-container{
height:50px;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
padding:6px 12px;
}

/* PAGE COUNTER */

#page-indicator{
color:white;
font-size:14px;
text-align:center;
margin-bottom:4px;
}

/* PROGRESS BAR */

#progress-bar{
width:100%;
height:4px;
background:#333;
border-radius:4px;
overflow:hidden;
}

#progress{
height:100%;
width:0%;
background:#4da3ff;
}

</style></head><body><button id="back">Back</button>

<div id="reader">
<canvas id="pdf-canvas"></canvas>
</div><div id="progress-container"><div id="page-indicator">1 / 1</div><div id="progress-bar">
<div id="progress"></div>
</div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script src="reader.js"></script></body></html>
